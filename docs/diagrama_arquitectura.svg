<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="680" viewBox="0 0 1200 680">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1f2937"/>
    </marker>
    <style>
      .title { font: 700 28px Arial, sans-serif; fill: #111827; }
      .label { font: 700 22px Arial, sans-serif; fill: #111827; }
      .text { font: 18px Arial, sans-serif; fill: #374151; }
      .mono { font: 18px Consolas, monospace; fill: #064e3b; }
      .small { font: 16px Arial, sans-serif; fill: #4b5563; }
      .box { stroke: #1f2937; stroke-width: 3; rx: 14; }
      .arrow { stroke: #1f2937; stroke-width: 4; fill: none; marker-start: url(#arrow); marker-end: url(#arrow); }
      .down { stroke: #1f2937; stroke-width: 4; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect x="35" y="35" width="1130" height="610" rx="24" fill="#f9fafb" stroke="#d1d5db" stroke-width="3"/>
  <text x="600" y="82" text-anchor="middle" class="title">Arquitectura cliente-servidor de Telegame</text>

  <rect x="440" y="180" width="320" height="150" class="box" fill="#dcfce7"/>
  <text x="600" y="225" text-anchor="middle" class="label">Servidor maestro</text>
  <text x="600" y="260" text-anchor="middle" class="text">TCP :5000</text>
  <text x="600" y="296" text-anchor="middle" class="mono">select + juego</text>

  <rect x="105" y="190" width="245" height="130" class="box" fill="#dbeafe"/>
  <text x="227" y="228" text-anchor="middle" class="label">Cliente A</text>
  <text x="227" y="263" text-anchor="middle" class="text">Jugador X</text>
  <text x="227" y="294" text-anchor="middle" class="small">Ramiro</text>

  <rect x="850" y="190" width="245" height="130" class="box" fill="#dbeafe"/>
  <text x="972" y="228" text-anchor="middle" class="label">Cliente B</text>
  <text x="972" y="263" text-anchor="middle" class="text">Jugador O</text>
  <text x="972" y="294" text-anchor="middle" class="small">Paulo</text>

  <rect x="455" y="470" width="290" height="125" class="box" fill="#dbeafe"/>
  <text x="600" y="508" text-anchor="middle" class="label">Cliente N</text>
  <text x="600" y="543" text-anchor="middle" class="text">Lobby / consulta</text>
  <text x="600" y="573" text-anchor="middle" class="small">Carla</text>

  <rect x="425" y="105" width="350" height="52" rx="10" fill="#fef9c3" stroke="#ca8a04" stroke-width="2"/>
  <text x="600" y="127" text-anchor="middle" class="small">El servidor central valida turnos,</text>
  <text x="600" y="148" text-anchor="middle" class="small">movimientos, tablero y resultados</text>

  <path d="M 350 255 L 440 255" class="arrow"/>
  <text x="395" y="236" text-anchor="middle" class="text">TCP</text>
  <text x="395" y="286" text-anchor="middle" class="small">comandos / respuestas</text>

  <path d="M 760 255 L 850 255" class="arrow"/>
  <text x="805" y="236" text-anchor="middle" class="text">TCP</text>
  <text x="805" y="286" text-anchor="middle" class="small">comandos / respuestas</text>

  <path d="M 600 470 L 600 330" class="arrow"/>
  <text x="632" y="405" class="text">TCP</text>

  <path d="M 600 157 L 600 180" class="down"/>
</svg>
